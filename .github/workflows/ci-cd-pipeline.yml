name: CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: 1. Code Quality Checks
    uses: ./.github/workflows/01-code-quality.yml

  database-migration:
    name: 2. Database Migration
    needs: code-quality
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    concurrency:
      group: test-database-migration
      cancel-in-progress: false
    uses: ./.github/workflows/02-database-migration.yml
    secrets:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      TEST_DATABASE_BRANCH_ID: ${{ secrets.TEST_DATABASE_BRANCH_ID }}
      PRODUCTION_DATABASE_BRANCH_ID: ${{ secrets.PRODUCTION_DATABASE_BRANCH_ID }}

  e2e-tests:
    name: 3. E2E Tests
    needs: database-migration
    uses: ./.github/workflows/03-e2e-tests.yml
    secrets:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      TEST_DATABASE_BRANCH_ID: ${{ secrets.TEST_DATABASE_BRANCH_ID }}
      PRODUCTION_DATABASE_BRANCH_ID: ${{ secrets.PRODUCTION_DATABASE_BRANCH_ID }}
