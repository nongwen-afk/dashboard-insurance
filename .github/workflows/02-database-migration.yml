name: 2. Database Migration

on:
  workflow_call:
    secrets:
      TEST_DATABASE_URL:
        required: true
      TEST_DATABASE_BRANCH_ID:
        required: true
      PRODUCTION_DATABASE_BRANCH_ID:
        required: false

permissions:
  contents: read

jobs:
  db-migration:
    name: Database Migration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify non-production database target
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          TEST_DATABASE_BRANCH_ID: ${{ secrets.TEST_DATABASE_BRANCH_ID }}
          PRODUCTION_DATABASE_BRANCH_ID: ${{ secrets.PRODUCTION_DATABASE_BRANCH_ID }}
        run: pnpm db:verify-test-target

      - name: Apply committed migrations to test database
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        run: pnpm db:migrate
