name: 2. Database Migration

on:
  workflow_run:
    workflows:
      - 1. Code Quality Checks
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: test-database-migration
  cancel-in-progress: false

jobs:
  db-migration:
    name: Database Migration
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify non-production database target
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          TEST_DATABASE_BRANCH_ID: ${{ secrets.TEST_DATABASE_BRANCH_ID }}
          PRODUCTION_DATABASE_BRANCH_ID: ${{ secrets.PRODUCTION_DATABASE_BRANCH_ID }}
        run: pnpm db:verify-test-target

      - name: Apply committed migrations to test database
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        run: pnpm db:migrate

      - name: Save pipeline commit
        run: printf '%s' '${{ github.event.workflow_run.head_sha }}' > pipeline-sha.txt

      - name: Upload pipeline context
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-context
          path: pipeline-sha.txt
          retention-days: 1
