name: CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.5.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check migration files match schema
        run: |
          pnpm db:generate
          if [ -n "$(git status --porcelain drizzle)" ]; then
            echo "Drizzle schema changed without committed migration files."
            git status --short drizzle
            git diff -- drizzle
            exit 1
          fi

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build
