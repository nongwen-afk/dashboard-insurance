name: 3. E2E Tests

on:
  workflow_run:
    workflows:
      - 2. Database Migration
    types:
      - completed

permissions:
  actions: read
  contents: read

concurrency:
  group: e2e-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  e2e-tests:
    name: Build and E2E Tests
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Download pipeline context
        uses: actions/download-artifact@v4
        with:
          name: pipeline-context
          path: pipeline-context
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Resolve tested commit
        id: pipeline
        run: echo "sha=$(cat pipeline-context/pipeline-sha.txt)" >> "$GITHUB_OUTPUT"

      - name: Checkout migrated commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pipeline.outputs.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify non-production database target
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          TEST_DATABASE_BRANCH_ID: ${{ secrets.TEST_DATABASE_BRANCH_ID }}
          PRODUCTION_DATABASE_BRANCH_ID: ${{ secrets.PRODUCTION_DATABASE_BRANCH_ID }}
        run: pnpm db:verify-test-target

      - name: Build application
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          NEXT_PUBLIC_APP_ENV: test
        run: pnpm run build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright tests
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          NEXT_PUBLIC_APP_ENV: test
        run: pnpm run test:e2e

      - name: Upload Playwright report and traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ steps.pipeline.outputs.sha }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 30
