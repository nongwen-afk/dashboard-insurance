name: 3. E2E Tests

on:
  workflow_call:
    secrets:
      TEST_DATABASE_URL:
        required: true
      TEST_DATABASE_BRANCH_ID:
        required: true
      PRODUCTION_DATABASE_BRANCH_ID:
        required: false

permissions:
  contents: read

jobs:
  e2e-tests:
    name: Build and E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout migrated commit
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify non-production database target
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          TEST_DATABASE_BRANCH_ID: ${{ secrets.TEST_DATABASE_BRANCH_ID }}
          PRODUCTION_DATABASE_BRANCH_ID: ${{ secrets.PRODUCTION_DATABASE_BRANCH_ID }}
        run: pnpm db:verify-test-target

      - name: Build application
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          NEXT_PUBLIC_APP_ENV: test
        run: pnpm run build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright tests
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          NEXT_PUBLIC_APP_ENV: test
        run: pnpm run test:e2e

      - name: Upload Playwright report and traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 30
